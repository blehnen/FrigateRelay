# CI workflow — FrigateRelay
#
# D1: GitHub Actions is the PR gate (build + unit tests only).
#     Coverage collection is Jenkins-side (see Jenkinsfile) — not here.
# D2: .NET 10 SDK blocks the VSTest target for Microsoft.Testing.Platform
#     projects (https://aka.ms/dotnet-test-mtp-error). Test projects have
#     OutputType=Exe and are invoked via `dotnet run --project ... --no-build`.

name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: 1
  NUGET_XMLDOC_MODE: skip

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore FrigateRelay.sln

      - name: Build
        run: dotnet build FrigateRelay.sln -c Release --no-restore

      - name: Test — all test projects
        shell: bash
        # Windows runners cannot launch Linux containers (Testcontainers requirement),
        # so integration tests are skipped on windows-latest. Linux leg runs all tests.
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            bash .github/scripts/run-tests.sh --skip-integration
          else
            bash .github/scripts/run-tests.sh
          fi
