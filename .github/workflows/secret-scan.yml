name: secret-scan

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  scan:
    name: Scan tree for secret-shaped strings
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          fetch-depth: 1

      - name: Run secret scan
        run: bash .github/scripts/secret-scan.sh scan

  tripwire-self-test:
    name: Verify every regex still matches the fixture
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          fetch-depth: 1

      - name: Run tripwire self-test
        run: bash .github/scripts/secret-scan.sh selftest
