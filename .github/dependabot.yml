# .github/dependabot.yml
#
# Dependabot version updates for FrigateRelay.
#
# Scope (D5 decision): nuget + github-actions ecosystems only.
# docker ecosystem is intentionally excluded until Phase 10 adds the Dockerfile.
#
# MSTest.Sdk version is managed via global.json msbuild-sdks key; Dependabot
# cannot currently update MSBuild SDK versions in global.json
# (dependabot-core#12824 / dependabot-core#8615). Update MSTest.Sdk manually
# when needed — see ROADMAP Phase 2 notes. This limitation does NOT apply to
# the MSTest PackageReference (uses Microsoft.NET.Sdk, not MSTest.Sdk), which
# Dependabot updates normally.
#
# FluentAssertions is pinned to <=6.12.2 (Apache-2.0). Version 7+ switched to
# a commercial license; upgrading is prohibited by the MIT license constraint
# in PROJECT.md. The ignore rule below prevents Dependabot from proposing any
# upgrade to 7.0.0 or higher.
version: 2
updates:
  # ── NuGet ────────────────────────────────────────────────────────────────────
  # Updates PackageReference entries in all *.csproj files under the repo root.
  # Does NOT use centralized Directory.Packages.props (not in use for this repo).
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    # Group lockstep families into one PR each to reduce noise.
    groups:
      microsoft-extensions:
        patterns:
          - "Microsoft.Extensions.*"
      mstest:
        patterns:
          - "MSTest*"
          - "Microsoft.Testing.*"
    ignore:
      # FluentAssertions 7+ is commercial-licensed; MIT constraint forbids upgrade.
      # Pin to <=6.12.2 forever. See PROJECT.md Constraints section.
      - dependency-name: "FluentAssertions"
        versions: [">= 7.0.0"]

  # ── GitHub Actions ───────────────────────────────────────────────────────────
  # Updates uses: lines in .github/workflows/*.yml files.
  # Dependabot searches /.github/workflows automatically when directory is "/".
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"

  # ── Docker ───────────────────────────────────────────────────────────────────
  # Watches docker/Dockerfile for base-image tag AND digest updates (Dependabot
  # rewrites both atomically when both are present — supply-chain hygiene B2/B3).
  #
  # Jenkinsfile SDK pin (mcr.microsoft.com/dotnet/sdk:10.0@sha256:...) is NOT
  # watched here — Dependabot docker ecosystem only scans Dockerfile-named files,
  # not Groovy files. Update Jenkinsfile manually when Dependabot bumps the
  # runtime-deps digest in docker/Dockerfile. See Jenkinsfile comment for the
  # exact docker pull / docker inspect command.
  #
  # docker/docker-compose.example.yml is NOT watched here — Dependabot docker
  # ecosystem does not reliably handle compose-form image pins. Update manually
  # when releasing a new version.
  - package-ecosystem: "docker"
    directory: "/docker"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(deps)"
