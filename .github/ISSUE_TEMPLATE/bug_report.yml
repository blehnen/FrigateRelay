name: "Bug report"
description: "Report a defect or unexpected behavior"
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        **Before filing:** If you believe you have found a security vulnerability, do **not** open a public issue.
        Please follow the process in [SECURITY.md](../SECURITY.md) instead.

  - type: dropdown
    id: component
    attributes:
      label: Affected component
      options:
        - Host
        - FrigateMqtt source
        - BlueIris plugin
        - Pushover plugin
        - CodeProjectAi plugin
        - FrigateSnapshot plugin
        - Build / CI
        - Docs
        - Other
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Configure ...
        2. Start host with ...
        3. Observe ...
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Docker
        - native (Linux)
        - native (Windows)
    validations:
      required: true

  - type: input
    id: dotnet_version
    attributes:
      label: .NET SDK version
      placeholder: "10.0.x"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste relevant structured log output (strip any secrets/IPs).
      render: text
    validations:
      required: false

  - type: checkboxes
    id: self_cert
    attributes:
      label: Self-certification
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: I have read SECURITY.md and confirmed this is not a security vulnerability.
          required: true
