name: "Feature request"
description: "Suggest a new capability or improvement"
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Before filing, please review
        [CONTRIBUTING.md](../CONTRIBUTING.md) and the **Non-Goals** section of
        [`.shipyard/PROJECT.md`](../.shipyard/PROJECT.md) — several capabilities
        are explicitly out of scope for v1.

  - type: textarea
    id: problem
    attributes:
      label: Problem you're trying to solve
      description: What is the current gap or friction?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you have evaluated (optional).
    validations:
      required: false

  - type: checkboxes
    id: self_cert
    attributes:
      label: Self-certification
      options:
        - label: I have read PROJECT.md Non-Goals and confirmed this request is not explicitly excluded.
          required: true
