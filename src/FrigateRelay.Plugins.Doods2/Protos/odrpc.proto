syntax = "proto3";

package odrpc;

import "google/protobuf/empty.proto";

option csharp_namespace = "FrigateRelay.Plugins.Doods2.Grpc";

service odrpc {

    // Get Config
    rpc GetDetectors(google.protobuf.Empty) returns (GetDetectorsResponse) {
    }

    // Process a request
    rpc Detect(DetectRequest) returns (DetectResponse) {
    }

    // Process stream requests
    rpc DetectStream(stream DetectRequest) returns (stream DetectResponse) {
    }

}

message GetDetectorsResponse {
    repeated Detector detectors = 1;
}

message Detector {
    // The name for this config
    string name = 1;
    // The type for this config
    string type = 2;
    // Model Name
    string model = 3;
    // Labels
    repeated string labels = 4;
    // The detection width
    int32 width = 5;
    // The detection height
    int32 height = 6;
    // The detection channels
    int32 channels = 7;
}

// The Process Request
message DetectRequest {
    // The ID for the request.
    string id = 1;
    // The ID for the request.
    string detector_name = 2;
    // The image data
    bytes data = 3;
    // A filename
    string file = 4;
    // What to detect
    map<string, float> detect = 5;
    // Sub regions for detection
    repeated DetectRegion regions = 6;
}

message DetectRegion {
    // Coordinates
    float top = 1;
    float left = 2;
    float bottom = 3;
    float right = 4;
    // What to detect
    map<string, float> detect = 5;
    bool covers = 6;
}

// Area for detection
message Detection {
    // Coordinates
    float top = 1;
    float left = 2;
    float bottom = 3;
    float right = 4;
    string label = 5;
    float confidence = 6;
}

message DetectResponse {
    // The id for the response
    string id = 1;
    // The detected areas
    repeated Detection detections = 2;
    // If there was an error (streaming endpoint only)
    string error = 3;
}
